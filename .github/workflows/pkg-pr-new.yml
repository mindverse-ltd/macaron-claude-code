name: pkg.pr.new

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Keep bun even though deps install with pnpm: the publish step's `npm pack`
      # fires the root `prepack`, which runs `bun build` to bundle the server.
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      # `pnpm exec`, not `pnpm dlx`/`bunx`: pkg.pr.new warns against dlx-style
      # runners in CI (they fetch an unpinned build each run). pkg-pr-new is a
      # devDependency, so this executes the lockfile-pinned binary from
      # node_modules/.bin. publish runs `npm pack`, which fires each package's
      # `prepack` hook (build shared → bundle server → build web; mcx then stages
      # those outputs into itself), so both tarballs ship prebuilt server/dist +
      # web/dist and run without Vite at runtime — no separate build step needed.
      # Force long-form URLs because compact URLs require npm repository metadata;
      # these are only published through pkg.pr.new, and --bin shows a CLI command.
      # Publish `mcc` (root, `.`, Claude), `mcx` (Codex) and `mkx` (Kimi) — three
      # independent, self-contained packages, each with its own bundle.
      # `npx mcx@…` / `npx mkx@…` work bare (bin name = package name) and pull
      # in only that package.
      - run: pnpm exec pkg-pr-new publish --no-compact --bin . ./mcx ./mkx
