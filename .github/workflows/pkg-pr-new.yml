name: pkg.pr.new

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Install with bun, not `npm ci`: npm's optional-deps bug (npm/cli#4828)
      # pins the committed lockfile to its generating OS, so `npm ci` on Linux
      # skips the platform-native rollup binary and crashes `vite build`. bun's
      # lockfile records every platform's optionalDependencies, so CI resolves
      # the Linux rollup correctly. bun also runs the server bundle below; the
      # published artifact still runs on plain Node.
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # prepack builds shared → bundles server → builds web, so the tarball
      # ships prebuilt server/dist + web/dist and runs without Vite at runtime.
      - run: npm run prepack
      - run: bunx pkg-pr-new publish
