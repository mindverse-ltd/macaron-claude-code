<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Macaron GenUI preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        background: #FAF9F5;
        color: #3D3929;
        font-size: 14px;
        line-height: 1.55;
        padding: 16px;
      }
      #root { min-height: 100%; }
      #status {
        position: fixed; bottom: 8px; right: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px; color: #8A8473;
        background: rgba(255,255,255,.85);
        padding: 2px 8px; border-radius: 999px;
        border: 1px solid #E8E6DC; pointer-events: none;
      }
      #status.err { color: #C0524A; border-color: rgba(192,82,74,.4); }
      #status.ok  { color: #5A8B5A; border-color: rgba(90,139,90,.3); }
      #errpane {
        position: fixed; top: 0; left: 0; right: 0;
        max-height: 50vh; overflow: auto;
        background: #fff; color: #C0524A;
        padding: 12px; margin: 0;
        font-family: ui-monospace, monospace; font-size: 11px;
        white-space: pre-wrap;
        border-bottom: 1px solid rgba(192,82,74,.3);
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <pre id="errpane"></pre>
    <div id="status">init…</div>
    <script type="module">
      const status = document.getElementById('status');
      const errpane = document.getElementById('errpane');
      const setStatus = (t, cls = '') => { status.textContent = t; status.className = cls; };
      const showError = (text) => {
        errpane.style.display = 'block';
        errpane.textContent = text;
        try { parent.postMessage({ type: 'preview-init-error', stack: text }, '*'); } catch {}
        console.error('[genui-preview]', text);
      };

      try {
        setStatus('loading partial-react…');
        const { GenUIRenderer } = await import('https://esm.sh/partial-react@0.0.1?dev');
        setStatus('booting renderer…');

        const origin = location.origin;
        const importmap = {
          imports: {
            'react':                  'https://esm.sh/react@19?dev',
            'react/jsx-runtime':      'https://esm.sh/react@19/jsx-runtime?dev',
            'react/jsx-dev-runtime':  'https://esm.sh/react@19/jsx-dev-runtime?dev',
            '$macaron/ui':            origin + '/genui-shim/ui.mjs',
            '$macaron/ui/charts':     origin + '/genui-shim/charts.mjs',
          },
        };

        const renderer = await GenUIRenderer.create(document.getElementById('root'), {
          flushMode: 'immediate',
          preserveStateOnUpdate: true,
          importmap,
          callbacks: {
            onError: (err, phase) => {
              const msg = (err && (err.message || String(err))) || 'unknown';
              setStatus(phase + ' · ' + msg.slice(0, 80), 'err');
              parent.postMessage({ type: 'preview-log', phase, message: msg }, '*');
            },
            onReady: () => setStatus('module ready', 'ok'),
            onRendered: () => setStatus('rendered', 'ok'),
          },
        });

        setStatus('ready');
        parent.postMessage({ type: 'preview-ready' }, '*');

        window.addEventListener('message', (e) => {
          const d = e.data;
          if (!d) return;
          try {
            if (d.type === 'tsx')    renderer.pushCode(d.code);
            if (d.type === 'finish') renderer.finish(d.code);
            if (d.type === 'reset')  renderer.render('');
          } catch (err) {
            setStatus('runtime · ' + (err && err.message || err), 'err');
          }
        });
      } catch (e) {
        setStatus('init failed: ' + String(e && e.message || e).slice(0, 80), 'err');
        showError(String(e && e.stack || e));
      }
    </script>
  </body>
</html>
